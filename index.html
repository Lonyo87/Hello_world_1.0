<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: rgba(0, 0, 0, 0.4);
      font-family: sans-serif;
    }

    .popup {
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .popup h1 {
      margin: 0 0 20px;
      font-size: 2rem;
      color: #333;
    }

    .popup button {
      padding: 10px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #4a90e2;
      color: white;
      cursor: pointer;
    }

    .popup button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div class="popup">
    <h1>Hello World</h1>
    <button onclick="window.close()">Close</button>
  </div>
</body>
</html>
